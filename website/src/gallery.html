<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Panimalar</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f8f9fa;
    }
    
    /* Main layout */
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    
    .section {
      padding: 40px 0;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 2.5rem;
      position: relative;
    }
    
    h1:after {
      content: '';
      display: block;
      width: 80px;
      height: 4px;
      background: #3498db;
      margin: 10px auto;
      border-radius: 2px;
    }
    
    /* Card and gallery grid */
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    
    .gallery-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .gallery-grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }
    
    /* Lightbox styles */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }
    
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }
    
    .lightbox-close:hover {
      color: #3498db;
    }
    
    .lightbox-nav {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      transform: translateY(-50%);
    }
    
    .lightbox-prev, .lightbox-next {
      color: white;
      font-size: 50px;
      cursor: pointer;
      transition: color 0.3s;
      user-select: none;
    }
    
    .lightbox-prev:hover, .lightbox-next:hover {
      color: #3498db;
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
      
      h1 {
        font-size: 2rem;
      }
    }
    
    @media (max-width: 480px) {
      .gallery-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      
      .card {
        padding: 10px;
      }
      
      .lightbox-prev, .lightbox-next {
        font-size: 30px;
      }
      
      .lightbox-close {
        font-size: 30px;
        top: 10px;
        right: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap section">
    <h1>Gallery</h1>
    <section class="card gallery-grid">
      <!-- Gallery images with sample placeholder URLs -->
      
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/facilities/GOPI1476-scaled.jpg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/facilities/GOPI1461-scaled.jpg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/highlights/zoho.png" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/highlights/tcs.png" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/conference/WhatsApp-Image-2020-05-13-at-11.56.58-AM_1280x853-1.jpeg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/conference/WhatsApp-Image-2020-05-13-at-11.51.29-AM_1280x853.jpeg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/conference/WhatsApp-Image-2020-05-13-at-11.33.49-AM_1280x853-1.jpeg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/highlights/international-conference.png" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/rankings/00_1280x853.jpg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/highlights/goldmedal.png" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/highlights/district-level.png" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/rankings/111_1280x853.jpg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/rankings/04_1280x853.jpg" alt="college img">
      <img src="https://www.panimalar.ac.in/enquiry/assets/images/highlights/cybersecurity.png" alt="college img">

    </section>
  </main>

  <!-- Lightbox for full-size image viewing -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <div class="lightbox-nav">
      <span class="lightbox-prev" id="lightboxPrev">&#10094;</span>
      <span class="lightbox-next" id="lightboxNext">&#10095;</span>
    </div>
    <img class="lightbox-content" id="lightboxImage" src="" alt="">
  </div>

  <script>
    // Gallery functionality
    document.addEventListener('DOMContentLoaded', function() {
      const galleryImages = document.querySelectorAll('.gallery-grid img');
      const lightbox = document.getElementById('lightbox');
      const lightboxImage = document.getElementById('lightboxImage');
      const lightboxClose = document.getElementById('lightboxClose');
      const lightboxPrev = document.getElementById('lightboxPrev');
      const lightboxNext = document.getElementById('lightboxNext');
      
      let currentImageIndex = 0;
      
      // Open lightbox with clicked image
      galleryImages.forEach((img, index) => {
        img.addEventListener('click', () => {
          currentImageIndex = index;
          updateLightboxImage();
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden'; // Prevent scrolling
        });
      });
      
      // Close lightbox
      lightboxClose.addEventListener('click', () => {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto'; // Re-enable scrolling
      });
      
      // Navigate to previous image
      lightboxPrev.addEventListener('click', (e) => {
        e.stopPropagation();
        currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
        updateLightboxImage();
      });
      
      // Navigate to next image
      lightboxNext.addEventListener('click', (e) => {
        e.stopPropagation();
        currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
        updateLightboxImage();
      });
      
      // Close lightbox when clicking outside the image
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          lightbox.classList.remove('active');
          document.body.style.overflow = 'auto';
        }
      });
      
      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        
        if (e.key === 'Escape') {
          lightbox.classList.remove('active');
          document.body.style.overflow = 'auto';
        } else if (e.key === 'ArrowLeft') {
          currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
          updateLightboxImage();
        } else if (e.key === 'ArrowRight') {
          currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
          updateLightboxImage();
        }
      });
      
      // Update lightbox image source
      function updateLightboxImage() {
        const imgSrc = galleryImages[currentImageIndex].src;
        const imgAlt = galleryImages[currentImageIndex].alt;
        lightboxImage.src = imgSrc;
        lightboxImage.alt = imgAlt;
      }
    });
  </script>
</body>
</html>
